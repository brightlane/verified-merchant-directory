{id:'bgm1',merchant:'BGM Girl',category:'Services',question:"What royalty-free music is safe to use on YouTube without copyright strikes?",answer:`This matters because getting it wrong means losing monetization on a video.

{id:'bgm2',merchant:'BGM Girl',category:'Services',question:"What background music can I use for my podcast without getting DMCA'd?",answer:`Podcast platforms actively monitor for unlicensed music. A DMCA complaint can affect your entire show's standing, not just one episode.

{id:'tax1',merchant:'Tax Extension',category:'Services',question:"How do I file a tax extension and what does it actually give me?",answer:`Filing a tax extension is simpler than most people think.

What an extension gives you: 6 more months to file. Federal deadline moves from April 15 to October 15.

What an extension does NOT give you: more time to pay. If you owe taxes, you still need to estimate and pay by April 15. The extension only covers filing, not payment.

Why filing an extension still matters if you owe: the failure-to-file penalty (5% per month, up to 25%) is much larger than the failure-to-pay penalty. Filing an extension eliminates the failure-to-file penalty even if you can't pay the full amount.

How to file: IRS Form 4868. Takes about 5 minutes online. Tax Extension handles federal and most state extensions in the same session. IRS confirmation is immediate.

Full walkthrough: ${BASE}/blog.html?p=how-to-file-tax-extension-2026`},

{id:'tax2',merchant:'Tax Extension',category:'Services',question:"What happens if I miss the tax deadline?",answer:`Two separate penalties kick in — one for not filing, one for not paying.

Failure-to-file penalty: 5% of unpaid taxes per month (or partial month), up to 25% maximum.

Failure-to-pay penalty: 0.5% of unpaid taxes per month, up to 25%.

Interest accrues on any unpaid amount from the original deadline.

The failure-to-file penalty is 10x larger than failure-to-pay. That's why filing an extension — even if you can't pay — is always the right move.

The fix: Filing IRS Form 4868 before April 15 eliminates the failure-to-file penalty entirely. Takes 5 minutes. Tax Extension handles federal and state extensions online with immediate IRS confirmation.

If you've already missed the deadline: file now anyway. Penalties grow the longer you wait. Filing late is always better than not filing.

Full breakdown: ${BASE}/blog.html?p=how-to-file-tax-extension-2026`},

const STORAGE_KEY='brightlane_quora_done';
function getDone(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch(e){return[]}}
function markDone(id){const d=getDone();if(!d.includes(id)){d.push(id);localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}}
function markUndone(id){localStorage.setItem(STORAGE_KEY,JSON.stringify(getDone().filter(d=>d!==id)))}

let currentFilter='all',currentId=null;

function renderStats(){
  const done=getDone();
  const total=QUESTIONS.length;
  const doneCount=QUESTIONS.filter(q=>done.includes(q.id)).length;
  const pct=Math.round((doneCount/total)*100);
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-done').textContent=doneCount;
  document.getElementById('stat-left').textContent=total-doneCount;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
}

function renderList(){
  const done=getDone();
  let filtered=QUESTIONS;
  if(currentFilter==='pending')filtered=QUESTIONS.filter(q=>!done.includes(q.id));
  if(currentFilter==='done')filtered=QUESTIONS.filter(q=>done.includes(q.id));
  document.getElementById('q-list').innerHTML=filtered.map(q=>{
    const isDone=done.includes(q.id);
    const isActive=q.id===currentId;
    return `<div class="q-item${isDone?' done':''}${isActive?' active':''}" data-id="${q.id}">
      <div class="q-merchant">${q.merchant}</div>
      <div class="q-title">${q.question}</div>
      <div class="q-category">${q.category}</div>
    </div>`;
  }).join('');
  document.querySelectorAll('.q-item').forEach(el=>el.addEventListener('click',()=>selectQuestion(el.dataset.id)));
}

function selectQuestion(id){
  currentId=id;
  const q=QUESTIONS.find(x=>x.id===id);
  const isDone=getDone().includes(id);
  renderList();
  document.getElementById('panel').innerHTML=`
    <div class="q-tag">${q.merchant} · ${q.category}</div>
    <div class="question-text">${q.question}</div>
    <div class="q-meta">
      <span class="q-badge hot">Quora Question</span>
      <span class="q-badge">${q.category}</span>
      ${isDone?'<span class="q-badge" style="border-color:var(--green);color:var(--green)">✓ Posted</span>':''}
    </div>
    <div class="answer-label"><span>READY-TO-PASTE QUORA ANSWER</span><span style="color:var(--dim);font-size:0.55rem">${q.answer.length} chars</span></div>
    <div class="answer-box" id="answer-box">${q.answer}</div>
    <div class="actions">
      <button class="btn btn-primary" onclick="copyAnswer()">⧉ Copy Answer</button>
      <button class="btn btn-warning" onclick="openQuora()">↗ Search Quora</button>
      ${isDone
        ?`<button class="btn btn-secondary" onclick="toggleDone('${id}',false)">↩ Mark Pending</button>`
        :`<button class="btn btn-success" onclick="toggleDone('${id}',true)">✓ Mark as Posted</button>`}
    </div>
    <div class="tips">
      <div class="tips-head">Posting Tips</div>
      <ul>
        <li>Search Quora for the exact question first — find the real thread, not just any similar question</li>
        <li>Read existing top answers before posting — add something they missed or say it better</li>
        <li>Post the answer as-is or personalise the opening line to sound like your experience</li>
        <li>The blog link goes naturally at the end — not in the opening sentence</li>
        <li>Add a credential to your Quora profile that matches the topic category</li>
        <li>Space out your answers — don't post 5 in one day, Quora flags that as spam</li>
      </ul>
    </div>`;
}

function copyAnswer(){
  const box=document.getElementById('answer-box');
  if(!box)return;
  navigator.clipboard.writeText(box.innerText).then(()=>{
    const f=document.getElementById('copy-flash');
    f.classList.add('show');
    setTimeout(()=>f.classList.remove('show'),2000);
  });
}

function openQuora(){
  const q=QUESTIONS.find(x=>x.id===currentId);
  if(!q)return;
  window.open('https://www.quora.com/search?q='+encodeURIComponent(q.question),'_blank');
}

function toggleDone(id,done){
  if(done)markDone(id);else markUndone(id);
  renderStats();renderList();selectQuestion(id);
}

document.getElementById('filter-tabs').addEventListener('click',e=>{
  const tab=e.target.closest('.filter-tab');
  if(!tab)return;
  currentFilter=tab.dataset.filter;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  renderList();
});

renderStats();renderList();
</script>
</body>
