  function init() {

    const post = POSTS[slug];

    // Meta
    document.title = `${post.title} | Brightlane`;
    document.getElementById('meta-title').textContent = `${post.title} | Brightlane`;
    document.getElementById('meta-desc').setAttribute('content', post.metaDesc);
    document.getElementById('meta-keywords').setAttribute('content', post.keywords);
    document.getElementById('meta-canonical').setAttribute('href', pageUrl);
    document.getElementById('og-title').setAttribute('content', post.title);
    document.getElementById('og-desc').setAttribute('content', post.metaDesc);
    document.getElementById('og-url').setAttribute('content', pageUrl);
    document.getElementById('tw-title').setAttribute('content', post.title);
    document.getElementById('tw-desc').setAttribute('content', post.metaDesc);

    // JSON-LD Article
    document.getElementById('jsonld-article').textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": post.title,
      "description": post.metaDesc,
      "url": pageUrl,
      "datePublished": post.date,
      "dateModified": post.date,
      "author": { "@type": "Organization", "name": "Brightlane Verified Merchant Directory" },
      "publisher": { "@type": "Organization", "name": "Brightlane", "url": `${BASE}/` }
    });

    // JSON-LD FAQ
    document.getElementById('jsonld-faq').textContent = JSON.stringify({
      "@context": "https://schema.org",

    const relatedSlugs = RELATED[slug] || [];

    const faqHTML = post.faqs.map(f => `

        <div class="faq-q" tabindex="0">${f.q}<span class="faq-icon">+</span></div>
        <div class="faq-a">${f.a}</div>
      </div>`).join('');

    document.getElementById('page-root').innerHTML = `
      <div class="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">Home</a>
        <span>›</span>
        <a href="blog.html">Blog</a>

          </div>
        </header>

        <article class="post-body" id="post-body">
          ${post.render(slug)}
        </article>

        <section class="faq-section" aria-labelledby="faq-h">
          <h2 id="faq-h">Frequently Asked Questions</h2>
          ${faqHTML}
        </section>

        <div class="related">
          <h2>Related Articles</h2>
          <div class="related-grid">${relatedHTML}</div>

        <div style="margin-top:48px;padding-top:24px;border-top:1px solid var(--border);font-size:0.75rem;color:var(--dim);line-height:1.6">
          <strong style="color:var(--muted)">Affiliate Disclosure:</strong> This article contains affiliate links. We may earn a commission when you purchase through our links at no additional cost to you. All merchants are verified partners through LinkConnector.
        </div>
      </div>
    `;

    // FAQ accordion
    document.querySelectorAll('.faq-q').forEach(q => {
      q.addEventListener('click', () => {
        const item = q.closest('.faq-item');
        const isOpen = item.classList.contains('open');
        document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
        if (!isOpen) item.classList.add('open');
      });
      q.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') q.click(); });
    });
  }
