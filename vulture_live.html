<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ seo_title }}</title>
    <link rel="canonical" href="https://yourlinkdomain.com/p/{{ product.slug }}">
    <meta name="description" content="Official deal for {{ product.title }} from {{ merchant_name }}. Verified affiliate link.">
    <link rel="stylesheet" href="/assets/chameleon.css"> </head>
<body>
    <nav class="breadcrumbs">
        <a href="/">Home</a> &raquo; 
        <a href="/c/{{ product.merchant_key }}">{{ product.merchant_key|title }}</a> &raquo; 
        <span>{{ product.title }}</span>
    </nav>

    <main>
        <h1>{{ product.title }}</h1>
        <div class="product-container">
            <img src="{{ product.image_url }}" alt="{{ product.title }}" loading="lazy">
            <div class="details">
                <p class="price">{{ product.price }}</p>
                <a href="{{ aff_link }}" class="buy-btn" rel="nofollow noreferrer">Secure Purchase via {{ product.merchant_key|title }}</a>
            </div>
        </div>
        <article class="description">
            <h3>Product Information</h3>
            <p>{{ product.description }}</p>
        </article>
    </main>

    <script src="/assets/chameleon.js"></script>
</body>
</html>
