name: 🦅 VULTURE TITAN ENGINE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    
    steps:
      - name: 🛰️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Dependencies
        run: pip install requests

      - name: 🦅 Harvest
        env:
          LC_API_KEY: ${{ secrets.LC_API_KEY }}
        run: python scripts/vulture_harvester.py

      - name: 🏗️ Generate
        run: python scripts/vulture_gen.py

      - name: 🔄 Commit Changes
        run: |
          git config --global user.name "VultureBot"
          git config --global user.email "vulture@bot.com"
          git add sitemap.xml merchants/*.html data/feeds/*.json
          git commit -m "🦅 VULTURE: 10K Update [$(date)]" || echo "No changes"
          # We use --force or allow failure to prevent the "Push" from stopping the "Deploy"
          git push origin main || echo "Push failed or nothing to push"

      - name: 📤 Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 Deploy
        uses: actions/deploy-pages@v4
