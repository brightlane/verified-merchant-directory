name: 🦅 VULTURE TITAN ENGINE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # ════════════════════════════════════════
  #  JOB 1 — BUILD
  # ════════════════════════════════════════
  build:
    runs-on: ubuntu-latest

    steps:

      - name: 🛰️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ✅ Validate Required Files
        run: |
          echo "── Checking required files ──"
          test -f index.html     && echo "✓ index.html"     || (echo "✗ index.html MISSING"     && exit 1)
          test -f affiliate.json && echo "✓ affiliate.json" || (echo "✗ affiliate.json MISSING"  && exit 1)
          test -f lmss.txt       && echo "✓ lmss.txt"       || (echo "✗ lmss.txt MISSING"        && exit 1)

      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  # ════════════════════════════════════════
  #  JOB 2 — DEPLOY
  # ════════════════════════════════════════
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
