name: Blog Pipeline 01 [en es fr de]

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 3 * * *'
    - cron: '0 6 * * *'
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
    - cron: '0 15 * * *'
    - cron: '0 18 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Expand languages if due
        run: node expand-languages.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate 10 blog posts [en es fr de]
        run: node generate-blog-post.js --lang en,es,fr,de
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update sitemaps
        run: node generate-sitemaps.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Update llms files
        run: node generate-llms.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "Seo-bot"
          git config user.email "seo-bot@brightlane.dev"
          git add -A
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add -A
          git diff --cached --quiet || git commit -m "blog[01]: publish 10 keywords × 100 langs [en es fr de] [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
