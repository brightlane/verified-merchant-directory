name: 🦅 VULTURE TITAN ENGINE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install
        run: pip install requests

      - name: 🏗️ Create Workspace
        run: mkdir -p data/feeds merchants scripts assets

      - name: 🦅 Run Vulture Protocol
        run: |
          python -u scripts/vulture_harvester.py
          python -u scripts/vulture_gen.py
          python -u scripts/vulture_sitemap.py
        env:
          # Providing both variable names to satisfy all scripts
          LC_API_KEY: "621835730ae935d10dc9bf41380d1f54"
          API_KEY: "621835730ae935d10dc9bf41380d1f54"

      - name: 🚀 Force Sync to GitHub
        run: |
          git config --global user.name "Vulture Bot"
          git config --global user.email "vulture@brightlane.io"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Vulture Titan: Syncing Data and Sitemap [skip ci]"
            git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main --force
            git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages --force
          else
            echo "No changes to sync."
          fi
