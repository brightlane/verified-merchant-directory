name: Vulture-Empire-2026-Omni-Protocol

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows you to run it manually with the "Run workflow" button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 📥 Phase 1: Harvest Merchant Feeds
        env:
          LC_API_KEY: ${{ secrets.LC_API_KEY }}
        run: python scripts/vulture_harvester.py

      - name: 🎨 Phase 2: Generate SEO Empire
        run: python scripts/vulture_gen.py

      - name: 🚀 Phase 3: Deploy to GitHub Pages
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "vulture@brightlane.net"
          
          # Stage all generated merchant pages and the updated index.html
          git add index.html merchants/ data/feeds/
          
          # Check if there are changes before committing to avoid empty commit errors
          if git diff --staged --quiet; then
            echo "No changes to commit. System is already up to date."
          else
            git commit -m "🔥 Vulture Sync: $(date +'%Y-%m-%d %H:%M:%S') [10K Pro]"
            git push
          fi
