name: Vulture Sync

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history so rebase works

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install
        run: pip install requests

      - name: Harvest
        env:
          LC_API_KEY: ${{ secrets.LC_API_KEY }}
        run: python scripts/vulture_harvester.py

      - name: Generate
        run: python scripts/vulture_gen.py

      - name: Deploy
        run: |
          git config --global user.name "vulture-bot"
          git config --global user.email "vulture@brightlane.net"
          git add .
          
          # Pull latest changes to avoid the [rejected] error
          git pull --rebase origin main
          
          # Only commit and push if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔥 Vulture Sync: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
