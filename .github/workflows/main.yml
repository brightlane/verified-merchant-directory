name: Vulture Sync 2026

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 🔄 Sync Workspace
        run: |
          git config --global user.name "vulture-bot"
          git config --global user.email "vulture@brightlane.net"
          git pull --rebase origin main

      - name: 🏗️ Run Vulture Engine
        env:
          LC_API_KEY: ${{ secrets.LC_API_KEY }}
        run: |
          python scripts/vulture_gen.py

      - name: 🚀 Deploy to GitHub Pages
        run: |
          git add .
          # The '|| exit 0' prevents failure if no files changed
          git commit -m "🔥 Vulture Empire Sync: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push origin main
