name: Vulture Sync 2026

on:
  workflow_dispatch:
    inputs:
      manual_trigger:
        description: 'Force a full empire rebuild'
        default: 'true'
        required: false
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install
        run: pip install requests

      - name: Sync Repo
        run: |
          git config --global user.name "vulture-bot"
          git config --global user.email "vulture@brightlane.net"
          git pull --rebase origin main

      - name: Harvest & Generate
        env:
          LC_API_KEY: ${{ secrets.LC_API_KEY }}
        run: |
          python scripts/vulture_harvester.py
          python scripts/vulture_gen.py

      - name: Deploy
        run: |
          git add .
          git commit -m "🔥 Automated Empire Sync [$(date)]" || exit 0
          git push origin main
