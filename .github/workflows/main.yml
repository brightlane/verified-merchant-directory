name: Vulture 10K Engine Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for rebase sync

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🚀 Run Vulture Protocol
        run: python scripts/vulture_gen.py

      - name: 💾 Commit & Push Global Update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull current state to prevent "rejected" errors
          git pull origin main --rebase
          
          git add index.html lmss.txt
          
          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            git commit -m "Vulture Pro v17: Syncing [$(date)]"
            git push origin main
          fi
