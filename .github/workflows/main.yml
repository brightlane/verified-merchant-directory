- name: 5. Force-Sync and Commit to GitHub
        run: |
          git config --global user.name "Vulture Bot"
          git config --global user.email "vulture@brightlane.net"
          
          # AGGRESSIVE ADD: Stage everything that was just created/modified
          git add index.html blog.html daily_caption.txt ai_briefing.json lmss.txt sitemap.xml || echo "Non-critical files skipped"
          
          # Directory checks - adding whatever exists
          if [ -d "data/feeds" ]; then git add data/feeds/*.json || echo "No feeds found"; fi
          if [ -d "merchants" ]; then git add merchants/ || echo "No merchant pages found"; fi
          if [ -d "sitemaps" ]; then git add sitemaps/ || echo "No sitemaps found"; fi
          
          # Final safety add for everything else in the root
          git add *.txt *.html *.json 2>/dev/null || echo "Final sweep complete"

          # COMMIT: Only proceed if there is actually something to save
          if git diff --staged --quiet; then
            echo "No changes to commit. Skipping sync."
          else
            git commit -m "Vulture Empire Sync: Omni-Protocol Update [$(date)]"
            
            # STEAMROLLER REBASE: This is the critical part to fix your error
            git fetch origin main
            git rebase -X theirs origin/main || (git rebase --abort && git pull --no-rebase origin main --strategy-option=theirs)
            git push origin main
          fi
