name: Vulture-Empire-2026-Omni-Protocol
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Daily at midnight

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Pull Latest Repository State
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 2. Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Core Logic Dependencies
        run: pip install requests

      - name: 4. Execute Vulture 10K Protocol
        run: |
          mkdir -p data/feeds merchants sitemaps assets
          python scripts/vulture_harvester.py
          python scripts/vulture_gen.py
          python scripts/vulture_sitemap.py
          python scripts/vulture_index.py
          python scripts/vulture_blog.py
          python scripts/vulture_social.py
          python scripts/vulture_ai_sync.py
        env:
          LC_API_KEY: ${{ secrets.LC_API_KEY }}

      - name: 5. Force-Sync and Commit to GitHub
        run: |
          git config --global user.name "Vulture Bot"
          git config --global user.email "vulture@brightlane.net"
          
          # SAFETY PROTOCOL: Check for directory existence before adding
          # This prevents the 'pathspec' error if the harvester finds 0 products
          if [ -d "data/feeds" ]; then git add data/feeds/*.json || echo "No JSON feeds"; fi
          if [ -d "merchants" ]; then git add merchants/ || echo "No merchant folders"; fi
          if [ -d "sitemaps" ]; then git add sitemaps/ || echo "No sitemaps folder"; fi
          
          # Add core operational files
          git add sitemap.xml lmss.txt robots.txt 404.html affiliate.json index.html blog.html daily_caption.txt ai_briefing.json || echo "Some core files missing"
          
          git commit -m "Vulture Empire Sync: Omni-Protocol Update [$(date)]" || echo "No changes to commit"
          
          # Steamroller Rebase logic
          git fetch origin main
          git rebase -X theirs origin/main || (git rebase --abort && git pull --no-rebase origin main --strategy-option=theirs)
          
          git push origin main

      - name: 6. Deploy Live to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
