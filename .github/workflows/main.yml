name: Vulture-Empire-2026-Omni-Protocol

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  vulture-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Deps
        run: pip install requests

      - name: 📥 Phase 1: Harvest
        env:
          LC_API_KEY: ${{ secrets.LC_API_KEY }}
        run: python scripts/vulture_harvester.py

      - name: 🎨 Phase 2: Generate
        run: python scripts/vulture_gen.py

      - name: 🚀 Phase 3: Commit & Push
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "vulture@brightlane.net"
          git add .
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "🔥 Vulture Sync: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
