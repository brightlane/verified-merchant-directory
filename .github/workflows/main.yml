name: Vulture Sync

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install
        run: pip install requests

      - name: Harvest
        env:
          LC_API_KEY: ${{ secrets.LC_API_KEY }}
        run: python scripts/vulture_harvester.py

      - name: Generate
        run: python scripts/vulture_gen.py

      - name: Deploy
        run: |
          git config --global user.name "vulture-bot"
          git config --global user.email "vulture@brightlane.net"
          git add .
          git commit -m "Vulture Update" || exit 0
          git push
