name: Vulture-Build-Pro
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 1'

jobs:
  run-vulture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: 1. Harvest & Generate (The 10K Engine)
        run: |
          mkdir -p data/feeds
          mkdir -p merchants
          mkdir -p sitemaps
          python scripts/vulture_harvester.py
          python scripts/vulture_gen.py
        env:
          LC_API_KEY: "621835730ae935d10dc9bf41380d1f54"

      - name: 2. Build Sitemaps
        run: python scripts/vulture_sitemap.py

      - name: 3. Sync and Push to Repo
        run: |
          git config --global user.name "Vulture Bot"
          git config --global user.email "vulture@brightlane.net"
          
          # Stage all generated files
          git add data/feeds/ merchants/ sitemaps/ sitemap.xml lmss.txt
          
          # Commit the changes
          git commit -m "Vulture Full Build & Meta Update: $(date)" || echo "No changes to commit"
          
          # FORCED SYNC LOGIC: 
          # This tells Git to favor the "local" (Bot) changes during a rebase conflict.
          git fetch origin main
          git rebase -X theirs origin/main || (git rebase --abort && git pull --no-rebase origin main --strategy-option=theirs)
          
          git push origin main

      - name: 4. Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
