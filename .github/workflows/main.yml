name: Vulture Sync

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual Empire Refresh'
  push:
    branches:
      - main
      - master # Added for compatibility

permissions:
  contents: write

jobs:
  vulture-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🔄 Force Sync Remote
        run: |
          git config --global user.name "vulture-bot"
          git config --global user.email "vulture@brightlane.net"
          git pull --rebase origin ${{ github.ref_name }}

      - name: 📥 Phase 1: Harvest
        env:
          LC_API_KEY: ${{ secrets.LC_API_KEY }}
        run: python scripts/vulture_harvester.py

      - name: 🎨 Phase 2: Generate
        run: python scripts/vulture_gen.py

      - name: 🚀 Phase 3: Push Changes
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes found."
          else
            git commit -m "🔥 Vulture Sync: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin ${{ github.ref_name }}
          fi
