name: Vulture-Empire-2026-Omni-Protocol

# 🚀 THIS SECTION CREATES THE "RUN BUTTON"
on:
  workflow_dispatch: # <--- This line enables the manual "Run" button
  schedule:
    - cron: '0 0 * * *' # Daily automated sync
  push:
    branches:
      - main # Runs every time you save code to main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Requirements
        run: pip install requests

      - name: 📥 Phase 1: Harvest Merchant Feeds
        env:
          LC_API_KEY: ${{ secrets.LC_API_KEY }}
        run: python scripts/vulture_harvester.py

      - name: 🎨 Phase 2: Generate Global Empire
        run: python scripts/vulture_gen.py

      - name: 🚀 Phase 3: Push to Live Site
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "vulture@brightlane.net"
          
          git add index.html merchants/ data/feeds/
          
          # Only commit if there are actually changes to show
          if git diff --staged --quiet; then
            echo "Network already at maximum density. Skipping commit."
          else
            git commit -m "🔥 Vulture Sync: $(date +'%Y-%m-%d %H:%M:%S') [10K Pro]"
            git push
          fi
