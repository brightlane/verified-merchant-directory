name: Vulture-Build
on:
  workflow_dispatch:
    inputs:
      manual:
        description: 'Run Vulture?'
        default: 'yes'
  push:
    branches:
      - main

jobs:
  run-vulture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install requests

      - name: Harvest
        run: python scripts/vulture_harvester.py
        env:
          LC_API_KEY: "621835730ae935d10dc9bf41380d1f54"

      - name: Generate
        run: python scripts/vulture_gen.py

      - name: Push
        run: |
          git config --global user.name "Vulture Bot"
          git config --global user.email "vulture@brightlane.net"
          git add data/feeds/*.json
          git add merchants/*.html
          git commit -m "Vulture Update" || echo "No changes"
          git push
