name: Vulture-Build
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-vulture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install requests

      - name: Harvest and Generate
        run: |
          mkdir -p data/feeds
          mkdir -p merchants
          python scripts/vulture_harvester.py
          python scripts/vulture_gen.py
        env:
          LC_API_KEY: "621835730ae935d10dc9bf41380d1f54"

      - name: Push to Repo
        run: |
          git config --global user.name "Vulture Bot"
          git config --global user.email "vulture@brightlane.net"
          # This forces git to see the new folders
          git add data/feeds/ merchants/ 
          # This commit command won't crash if nothing changed
          git commit -m "Vulture Update: $(date)" || echo "No changes to commit"
          git push
