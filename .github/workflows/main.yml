name: Vulture Sync

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 Deps
        run: pip install requests

      - name: 🔄 Sync Remote Changes
        run: |
          git config --global user.name "vulture-bot"
          git config --global user.email "vulture@brightlane.net"
          # Pull any manual changes you made before we start generating
          git pull --rebase origin main

      - name: 📥 Phase 1: Harvest
        env:
          LC_API_KEY: ${{ secrets.LC_API_KEY }}
        run: python scripts/vulture_harvester.py

      - name: 🎨 Phase 2: Generate (Empire + Sitemap)
        run: python scripts/vulture_gen.py

      - name: 🚀 Phase 3: Deploy
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔥 Vulture Sync: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
