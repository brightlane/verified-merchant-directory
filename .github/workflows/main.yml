name: Vulture 10K Engine Build

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight to refresh tracking
  workflow_dispatch: # Allows you to run it manually

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🚀 Run Vulture Protocol
        run: python scripts/vulture_gen.py

      - name: 💾 Commit & Push Global Update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the generated files
          git add index.html lmss.txt
          
          # Check for changes to avoid empty commit errors
          if git diff --staged --quiet; then
            echo "No changes detected in index.html or lmss.txt"
          else
            git commit -m "Vulture Pro v17: Global Dashboard Sync [$(date)]"
            git push
          fi
