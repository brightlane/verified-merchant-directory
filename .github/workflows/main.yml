name: Vulture-Build-Pro-v17-Blog
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Upgraded to Daily at midnight for the Daily Blog Write

jobs:
  run-vulture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: 1. Full Engine Build (The 10K Protocol)
        run: |
          mkdir -p data/feeds merchants sitemaps
          # A: Fetch latest product feeds
          python scripts/vulture_harvester.py
          # B: Generate 10,000 product pages with unique Campaign IDs
          python scripts/vulture_gen.py
          # C: Build the SEO Sitemap
          python scripts/vulture_sitemap.py
          # D: Generate the Master Index for all 17 merchants
          python scripts/vulture_index.py
          # E: Daily Blog Write (The Daily Intelligence)
          python scripts/vulture_blog.py
        env:
          LC_API_KEY: "621835730ae935d10dc9bf41380d1f54"

      - name: 2. Sync and Push to Repo
        run: |
          git config --global user.name "Vulture Bot"
          git config --global user.email "vulture@brightlane.net"
          
          # Add all core files, directory pages, and the new blog
          git add data/feeds/ merchants/ sitemaps/ sitemap.xml lmss.txt robots.txt 404.html affiliate.json index.html blog.html
          
          git commit -m "Full Network Update: 17 Campaigns + Daily Blog $(date)" || echo "No changes to commit"
          
          # Conflict Prevention: Bot version always wins
          git fetch origin main
          git rebase -X theirs origin/main || (git rebase --abort && git pull --no-rebase origin main --strategy-option=theirs)
          
          git push origin main

      - name: 3. Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
