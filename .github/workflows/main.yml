name: Vulture-Empire-2026-Omni-Protocol
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Fires daily at midnight to refresh all 17 campaigns

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: 1. Pull Latest Repository State
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 2. Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Core Logic Dependencies
        run: pip install requests

      - name: 4. Execute Vulture 10K Protocol
        run: |
          mkdir -p data/feeds merchants sitemaps assets
          
          # A: Fetch Merchant Data (E-file, Build A Sign, HalloweenCostumes, etc.)
          python scripts/vulture_harvester.py
          
          # B: Generate 10,000+ SEO Pages with unique Parallel Tracking IDs
          python scripts/vulture_gen.py
          
          # C: Build Global SEO Sitemap for Google Search Console
          python scripts/vulture_sitemap.py
          
          # D: Generate Master Directory Homepage
          python scripts/vulture_index.py
          
          # E: Daily Blog Intelligence Write (Authority Builder)
          python scripts/vulture_blog.py
          
          # F: Daily Social Media Caption Generator (ManyChat Lead-Gen)
          python scripts/vulture_social.py

          # G: AI Intelligence Sync (For SearchGPT/Perplexity/Custom GPTs)
          python scripts/vulture_ai_sync.py
        env:
          LC_API_KEY: "621835730ae935d10dc9bf41380d1f54"

      - name: 5. Force-Sync and Commit to GitHub
        run: |
          git config --global user.name "Vulture Bot"
          git config --global user.email "vulture@brightlane.net"
          
          # Track every asset required for the ecosystem to function
          git add data/feeds/*.json \
                  merchants/ \
                  sitemaps/ \
                  sitemap.xml \
                  lmss.txt \
                  robots.txt \
                  404.html \
                  affiliate.json \
                  index.html \
                  blog.html \
                  daily_caption.txt \
                  ai_briefing.json
          
          git commit -m "Vulture Empire Sync: 17 Campaigns + Blog + Social + AI [$(date)]" || echo "No changes detected"
          
          # The 'Steamroller' logic: Bot version always overrides conflicts
          git fetch origin main
          git rebase -X theirs origin/main || (git rebase --abort && git pull --no-rebase origin main --strategy-option=theirs)
          
          git push origin main

      - name: 6. Deploy Live to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
