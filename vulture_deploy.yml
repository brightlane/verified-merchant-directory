name: Vulture Auto-Build & Deploy
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual Harvest'
  push:
    branches:
      - main

jobs:
  vulture-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Harvester
        run: python scripts/vulture_harvester.py
        env:
          LC_API_KEY: "621835730ae935d10dc9bf41380d1f54"

      - name: Run Page Generator
        run: python scripts/vulture_gen.py

      - name: Push to Repo
        run: |
          git config --global user.name "Vulture Bot"
          git config --global user.email "vulture@brightlane.net"
          git add data/feeds/*.json
          git add merchants/*.html
          git commit -m "Vulture Build: ${{ github.event.inputs.reason }}" || echo "No changes"
          git push
