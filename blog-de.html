    document.getElementById('meta-title').textContent=`${post.title} | Brightlane`;
    document.getElementById('meta-desc').setAttribute('content',post.metaDesc);
    document.getElementById('meta-keywords').setAttribute('content',post.keywords);
    document.getElementById('meta-canonical').setAttribute('href',pageUrl);
    document.getElementById('og-title').setAttribute('content',post.title);
    document.getElementById('og-desc').setAttribute('content',post.metaDesc);
    document.getElementById('og-url').setAttribute('content',pageUrl);
    document.getElementById('tw-title').setAttribute('content',post.title);
    document.getElementById('tw-desc').setAttribute('content',post.metaDesc);
    document.getElementById('jsonld-article').textContent=JSON.stringify({"@context":"https://schema.org","@type":"Article","headline":post.title,"description":post.metaDesc,"url":pageUrl,"datePublished":post.date,"dateModified":post.date,"inLanguage":"de","author":{"@type":"Organization","name":"Brightlane Händlerverzeichnis"},"publisher":{"@type":"Organization","name":"Brightlane","url":`${BASE}/`}});
    document.getElementById('jsonld-faq').textContent=JSON.stringify({"@context":"https://schema.org","@type":"FAQPage","mainEntity":post.faqs.map(f=>({"@type":"Question","name":f.q,"acceptedAnswer":{"@type":"Answer","text":f.a}}))});
    document.getElementById('jsonld-breadcrumb').textContent=JSON.stringify({"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Startseite","item":`${BASE}/`},{"@type":"ListItem","position":2,"name":"Blog","item":`${BASE}/blog-de.html`},{"@type":"ListItem","position":3,"name":post.title,"item":pageUrl}]});
    renderPost(post,slug);
  }

  function renderPost(post,slug){
    const relSlugs=RELATED[slug]||[];
    const relHTML=relSlugs.map(rs=>{const rp=POSTS[rs];if(!rp)return'';return`<a href="blog-de.html?p=${rs}" class="related-card"><div class="related-cat">${rp.category}</div><div class="related-title">${rp.title}</div></a>`;}).join('');
    const faqHTML=post.faqs.map(f=>`<div class="faq-item"><div class="faq-q" tabindex="0">${f.q}<span class="faq-icon">+</span></div><div class="faq-a">${f.a}</div></div>`).join('');
    document.getElementById('page-root').innerHTML=`
      <div class="breadcrumb"><a href="index.html">Startseite</a><span>›</span><a href="blog-de.html">Blog</a><span>›</span><span>${post.category}</span></div>
      <div class="article-wrap">
        <header class="post-header">
          <div class="post-cat">${post.category}</div>
          <h1 class="post-title"><span class="hl">${post.titleHl}</span> ${post.titleRest}</h1>
          <div class="post-meta">
            <span>Brightlane Redaktion</span><span class="sep">·</span>
            <span>⏱ ${post.readTime}</span><span class="sep">·</span>
            <span class="updated">Aktualisiert ${post.date}</span><span class="sep">·</span>
            <a href="blog.html" style="color:var(--dim);font-size:0.75rem">🌐 Read in English</a>
          </div>
        </header>
        <article class="post-body">${post.render(slug)}</article>
        <section class="faq-section"><h2>Häufig gestellte Fragen</h2>${faqHTML}</section>
        <div class="related"><h2>Ähnliche Artikel</h2><div class="related-grid">${relHTML}</div></div>
        <div style="margin-top:44px;padding-top:22px;border-top:1px solid var(--border);font-size:0.75rem;color:var(--dim);line-height:1.7"><strong style="color:var(--muted)">Affiliate-Offenlegung:</strong> Dieser Artikel enthält Affiliate-Links. Wir erhalten möglicherweise eine Provision, wenn Sie über unsere Links einen Kauf tätigen, ohne dass Ihnen zusätzliche Kosten entstehen. Alle Händler sind verifizierte Partner über das LinkConnector-Netzwerk.</div>
      </div>`;
    document.querySelectorAll('.faq-q').forEach(q=>{q.addEventListener('click',()=>{const item=q.closest('.faq-item');const isOpen=item.classList.contains('open');document.querySelectorAll('.faq-item').forEach(i=>i.classList.remove('open'));if(!isOpen)item.classList.add('open');});q.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')q.click();});});
  }

  function renderIndex(){
    document.title='Blog — Brightlane Händlerverzeichnis';
    const cards=Object.entries(POSTS).map(([slug,post])=>`<a href="blog-de.html?p=${slug}" class="post-card"><div class="post-card-cat">${post.category}</div><div class="post-card-title">${post.title}</div><div class="post-card-desc">${post.metaDesc}</div><div class="post-card-meta"><span>${post.readTime}</span><span class="post-card-read">Lesen →</span></div></a>`).join('');
    document.getElementById('page-root').innerHTML=`
      <div class="blog-index">
        <div style="margin-bottom:40px">
          <div style="font-family:var(--font-head);font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px">Brightlane Blog auf Deutsch</div>
          <h1 style="font-family:var(--font-head);font-size:clamp(1.8rem,4vw,3rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px">Kaufratgeber und Testberichte</h1>
          <p style="color:var(--muted);font-size:1rem">Ehrliche Testberichte und Vergleiche, die Ihnen helfen, das richtige Produkt zu finden — mit verifizierten Links zu den besten Preisen.</p>
          <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
            <a href="blog.html"    style="display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--dim);border:1px solid var(--border);padding:6px 14px;border-radius:6px">🌐 English</a>
            <a href="blog-zh.html" style="display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--dim);border:1px solid var(--border);padding:6px 14px;border-radius:6px">🌐 中文</a>
            <a href="blog-es.html" style="display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--dim);border:1px solid var(--border);padding:6px 14px;border-radius:6px">🌐 Español</a>
            <a href="blog-fr.html" style="display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--dim);border:1px solid var(--border);padding:6px 14px;border-radius:6px">🌐 Français</a>
          </div>
        </div>
        <div class="post-grid">${cards}</div>
      </div>`;
  }

  init();
  </script>
</body>
</html>
