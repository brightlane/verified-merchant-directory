          <div class="verdict-desc">Complété en 5 minutes. Prolongations fédérales et d'État disponibles. Confirmation IRS immédiate. La façon la plus rapide d'éviter les pénalités de non-dépôt.</div>
          <a href="${aff('taxextension',1,slug)}" class="cta-btn" target="_blank" rel="noopener sponsored">Demander une Prolongation d'Impôts →</a>
        </div>
      `
    }

  };

  const RELATED = {
    "meilleur-logiciel-montage-video-2026":    ["avis-movavi-2026","recuperer-photos-supprimees-iphone-2026","creer-application-sans-coder-2026"],
    "avis-movavi-2026":                        ["meilleur-logiciel-montage-video-2026","recuperer-photos-supprimees-iphone-2026","musique-libre-droits-youtube-2026"],
    "recuperer-photos-supprimees-iphone-2026": ["meilleur-logiciel-montage-video-2026","avis-movavi-2026","creer-application-sans-coder-2026"],
    "impression-toile-pas-chere-2026":         ["soin-peau-sensible-naturel-2026","soulagement-oignon-pied-2026","medicaments-animaux-en-ligne-2026"],
    "certification-cpr-en-ligne-2026":         ["certification-pmp-en-ligne-2026","prolongation-impots-en-ligne-2026","medicaments-animaux-en-ligne-2026"],
    "medicaments-animaux-en-ligne-2026":       ["certification-cpr-en-ligne-2026","soulagement-oignon-pied-2026","soin-peau-sensible-naturel-2026"],
    "certification-pmp-en-ligne-2026":         ["certification-cpr-en-ligne-2026","creer-application-sans-coder-2026","prolongation-impots-en-ligne-2026"],
    "musique-libre-droits-youtube-2026":       ["meilleur-logiciel-montage-video-2026","avis-movavi-2026","creer-application-sans-coder-2026"],
    "creer-application-sans-coder-2026":       ["meilleur-logiciel-montage-video-2026","musique-libre-droits-youtube-2026","certification-pmp-en-ligne-2026"],
    "soulagement-oignon-pied-2026":            ["soin-peau-sensible-naturel-2026","medicaments-animaux-en-ligne-2026","certification-cpr-en-ligne-2026"],
    "soin-peau-sensible-naturel-2026":         ["soulagement-oignon-pied-2026","medicaments-animaux-en-ligne-2026","impression-toile-pas-chere-2026"],
    "prolongation-impots-en-ligne-2026":       ["certification-pmp-en-ligne-2026","certification-cpr-en-ligne-2026","musique-libre-droits-youtube-2026"]
  };

  function init(){
    const params=new URLSearchParams(window.location.search);
    const slug=params.get('p');
    if(!slug||!POSTS[slug]){renderIndex();return;}
    const post=POSTS[slug];
    const pageUrl=`${BASE}/blog-fr.html?p=${slug}`;
    document.title=`${post.title} | Brightlane`;
    document.getElementById('meta-title').textContent=`${post.title} | Brightlane`;
    document.getElementById('meta-desc').setAttribute('content',post.metaDesc);
    document.getElementById('meta-keywords').setAttribute('content',post.keywords);
    document.getElementById('meta-canonical').setAttribute('href',pageUrl);
    document.getElementById('og-title').setAttribute('content',post.title);
    document.getElementById('og-desc').setAttribute('content',post.metaDesc);
    document.getElementById('og-url').setAttribute('content',pageUrl);
    document.getElementById('tw-title').setAttribute('content',post.title);
    document.getElementById('tw-desc').setAttribute('content',post.metaDesc);
    document.getElementById('jsonld-article').textContent=JSON.stringify({"@context":"https://schema.org","@type":"Article","headline":post.title,"description":post.metaDesc,"url":pageUrl,"datePublished":post.date,"dateModified":post.date,"inLanguage":"fr","author":{"@type":"Organization","name":"Brightlane Répertoire de Marchands"},"publisher":{"@type":"Organization","name":"Brightlane","url":`${BASE}/`}});
    document.getElementById('jsonld-faq').textContent=JSON.stringify({"@context":"https://schema.org","@type":"FAQPage","mainEntity":post.faqs.map(f=>({"@type":"Question","name":f.q,"acceptedAnswer":{"@type":"Answer","text":f.a}}))});
    document.getElementById('jsonld-breadcrumb').textContent=JSON.stringify({"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Accueil","item":`${BASE}/`},{"@type":"ListItem","position":2,"name":"Blog","item":`${BASE}/blog-fr.html`},{"@type":"ListItem","position":3,"name":post.title,"item":pageUrl}]});
    renderPost(post,slug);
  }

  function renderPost(post,slug){
    const relSlugs=RELATED[slug]||[];
    const relHTML=relSlugs.map(rs=>{const rp=POSTS[rs];if(!rp)return'';return`<a href="blog-fr.html?p=${rs}" class="related-card"><div class="related-cat">${rp.category}</div><div class="related-title">${rp.title}</div></a>`;}).join('');
    const faqHTML=post.faqs.map(f=>`<div class="faq-item"><div class="faq-q" tabindex="0">${f.q}<span class="faq-icon">+</span></div><div class="faq-a">${f.a}</div></div>`).join('');
    document.getElementById('page-root').innerHTML=`
      <div class="breadcrumb"><a href="index.html">Accueil</a><span>›</span><a href="blog-fr.html">Blog</a><span>›</span><span>${post.category}</span></div>
      <div class="article-wrap">
        <header class="post-header">
          <div class="post-cat">${post.category}</div>
          <h1 class="post-title"><span class="hl">${post.titleHl}</span> ${post.titleRest}</h1>
          <div class="post-meta">
            <span>Brightlane Éditorial</span><span class="sep">·</span>
            <span>⏱ ${post.readTime}</span><span class="sep">·</span>
            <span class="updated">Mis à jour le ${post.date}</span><span class="sep">·</span>
            <a href="blog.html" style="color:var(--dim);font-size:0.75rem">🌐 Read in English</a>
          </div>
        </header>
        <article class="post-body">${post.render(slug)}</article>
        <section class="faq-section"><h2>Foire aux Questions</h2>${faqHTML}</section>
        <div class="related"><h2>Articles Similaires</h2><div class="related-grid">${relHTML}</div></div>
        <div style="margin-top:44px;padding-top:22px;border-top:1px solid var(--border);font-size:0.75rem;color:var(--dim);line-height:1.7"><strong style="color:var(--muted)">Divulgation d'affiliation :</strong> Cet article contient des liens d'affiliation. Nous pouvons gagner une commission lorsque vous effectuez un achat via nos liens sans frais supplémentaires pour vous. Tous les marchands sont des partenaires vérifiés via le réseau LinkConnector.</div>
      </div>`;
    document.querySelectorAll('.faq-q').forEach(q=>{q.addEventListener('click',()=>{const item=q.closest('.faq-item');const isOpen=item.classList.contains('open');document.querySelectorAll('.faq-item').forEach(i=>i.classList.remove('open'));if(!isOpen)item.classList.add('open');});q.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')q.click();});});
  }

  function renderIndex(){
    document.title='Blog — Brightlane Répertoire de Marchands';
    const cards=Object.entries(POSTS).map(([slug,post])=>`<a href="blog-fr.html?p=${slug}" class="post-card"><div class="post-card-cat">${post.category}</div><div class="post-card-title">${post.title}</div><div class="post-card-desc">${post.metaDesc}</div><div class="post-card-meta"><span>${post.readTime}</span><span class="post-card-read">Lire →</span></div></a>`).join('');
    document.getElementById('page-root').innerHTML=`
      <div class="blog-index">
        <div style="margin-bottom:40px">
          <div style="font-family:var(--font-head);font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px">Blog Brightlane en Français</div>
          <h1 style="font-family:var(--font-head);font-size:clamp(1.8rem,4vw,3rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px">Guides d'Achat et Avis Produits</h1>
          <p style="color:var(--muted);font-size:1rem">Avis honnêtes et comparatifs pour vous aider à trouver le bon produit — avec des liens vérifiés vers les meilleurs prix.</p>
          <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
            <a href="blog.html"    style="display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--dim);border:1px solid var(--border);padding:6px 14px;border-radius:6px">🌐 English</a>
            <a href="blog-zh.html" style="display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--dim);border:1px solid var(--border);padding:6px 14px;border-radius:6px">🌐 中文</a>
            <a href="blog-es.html" style="display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--dim);border:1px solid var(--border);padding:6px 14px;border-radius:6px">🌐 Español</a>
          </div>
        </div>
        <div class="post-grid">${cards}</div>
      </div>`;
  }

  init();
  </script>
</body>
</html>
