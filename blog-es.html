        <div style="margin-top:44px;padding-top:22px;border-top:1px solid var(--border);font-size:0.75rem;color:var(--dim);line-height:1.7"><strong style="color:var(--muted)">Divulgación de afiliados:</strong> Este artículo contiene enlaces de afiliados. Podemos ganar una comisión cuando realizas una compra a través de nuestros enlaces sin coste adicional para ti. Todos los comerciantes son socios verificados a través de la red LinkConnector.</div>
      </div>`;
    document.querySelectorAll('.faq-q').forEach(q=>{q.addEventListener('click',()=>{const item=q.closest('.faq-item');const isOpen=item.classList.contains('open');document.querySelectorAll('.faq-item').forEach(i=>i.classList.remove('open'));if(!isOpen)item.classList.add('open');});q.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')q.click();});});
  }

  function renderIndex(){
    document.title='Blog — Brightlane Directorio de Comerciantes';
    const cards=Object.entries(POSTS).map(([slug,post])=>`<a href="blog-es.html?p=${slug}" class="post-card"><div class="post-card-cat">${post.category}</div><div class="post-card-title">${post.title}</div><div class="post-card-desc">${post.metaDesc}</div><div class="post-card-meta"><span>${post.readTime}</span><span class="post-card-read">Leer →</span></div></a>`).join('');
    document.getElementById('page-root').innerHTML=`
      <div class="blog-index">
        <div style="margin-bottom:40px">
          <div style="font-family:var(--font-head);font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px">Blog Brightlane en Español</div>
          <h1 style="font-family:var(--font-head);font-size:clamp(1.8rem,4vw,3rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px">Guías de Compra y Reseñas</h1>
          <p style="color:var(--muted);font-size:1rem">Reseñas honestas y comparativas para ayudarte a encontrar el producto correcto — con enlaces verificados a los mejores precios.</p>
          <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
            <a href="blog.html" style="display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--dim);border:1px solid var(--border);padding:6px 14px;border-radius:6px">🌐 English</a>
            <a href="blog-zh.html" style="display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--dim);border:1px solid var(--border);padding:6px 14px;border-radius:6px">🌐 中文</a>
          </div>
        </div>
        <div class="post-grid">${cards}</div>
      </div>`;
  }

  init();
  </script>
</body>
