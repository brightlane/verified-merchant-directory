    .masthead-logo {

      font-size: 1.25rem;

      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }

    .dateline-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .verified-stamp {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--green);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 2px;

      grid-template-columns: 1fr auto;
      gap: 60px;
      align-items: start;
    }

    @media (max-width: 700px) {
      .hero { grid-template-columns: 1fr; gap: 32px; }
    }

    .hero-kicker {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hero-kicker::before {
      content: '';
      display: inline-block;
      width: 24px;
      height: 2px;
      background: var(--red);
    }

    .hero-name {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 20px;
    }

    .hero-tagline {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
      max-width: 520px;
      margin-bottom: 32px;
      border-left: 3px solid var(--gold);
      padding-left: 16px;
    }

    .hero-meta {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .meta-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .meta-value {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink);
    }

    .meta-value.tag {
      display: inline-block;
      background: var(--warm);
      border: 1px solid var(--rule);
      padding: 2px 10px;
      border-radius: 2px;
      font-size: 0.78rem;
    }

    /* ── CTA BUTTON ── */

      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--ink);
      color: var(--cream);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.95rem;
      padding: 16px 36px;
      border: 2px solid var(--ink);
      cursor: pointer;
      transition: background .2s, color .2s;
      letter-spacing: 0.02em;
    }

    .cta-primary:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--ink);
    }

    .cta-primary svg { transition: transform .2s; }
    .cta-primary:hover svg { transform: translateX(4px); }

    .cta-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 500;
      padding: 16px 0;
      border: none;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: var(--rule);
      transition: color .2s;
    }

    .cta-secondary:hover { color: var(--ink); }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

      background: var(--cream);
      border: 1px solid var(--rule);
      border-top: 4px solid var(--ink);
      padding: 28px 24px;
      width: 260px;
      flex-shrink: 0;

      margin-bottom: 16px;
      display: block;

      font-weight: 600;

      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--rule2);
      font-size: 0.8rem;

    .sidebar-stat-label { color: var(--muted); }
    .sidebar-stat-value { font-weight: 600; color: var(--ink); }

      margin: 40px auto 0;
      padding: 0 clamp(20px,5vw,80px);
      border: none;
      border-top: 2px solid var(--ink);
      position: relative;
    }

    .section-rule::after {
      content: attr(data-label);
      position: absolute;
      top: -0.6em;
      left: clamp(20px,5vw,80px);
      background: var(--paper);
      padding: 0 12px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);

      grid-template-columns: 1fr 320px;
      gap: 60px;
      align-items: start;

      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 1px solid var(--rule);
      margin-bottom: 40px;

      border-right: 1px solid var(--rule);

      font-weight: 900;
      color: var(--rule);

      padding: 13px;

    .site-footer {

      font-size: 0.75rem;
      line-height: 1.7;

      margin: 100px auto;
      padding: 0 clamp(20px,5vw,80px);
      text-align: center;

      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .error-state p {
      color: var(--muted);
      margin-bottom: 24px;
    }

    /* ── Animations ── */

      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero, .content-wrap {
      animation: fadeIn .5s ease both;
    }

    .content-wrap { animation-delay: .1s; }
  </style>

// ─── AFFILIATE LINK BUILDER ───────────────────────────────────────────
function buildUrl(merchantId) {
  const m = MERCHANTS[merchantId];
  if (!m) return '#';
  const u = new URL(m.url);
  u.searchParams.set('utm_source', 'brightlane-campaign-page');
  u.searchParams.set('utm_medium', 'affiliate');
  u.searchParams.set('utm_campaign', merchantId);
  u.searchParams.set('utm_content', 'campaign-page-cta');
  return u.toString();
}
