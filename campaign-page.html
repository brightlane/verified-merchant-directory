  // ═══════════════════════════════════════════════════════════
  //  UTM LINK BUILDER
  // ═══════════════════════════════════════════════════════════
  function buildLink(url, position, campaignId) {
    const u = new URL(url);
    u.searchParams.set('utm_source', 'brightlane-directory');
    u.searchParams.set('utm_medium', 'affiliate');
    u.searchParams.set('utm_campaign', campaignId);
    u.searchParams.set('utm_content', `pos-${position}`);
    return u.toString();
  }

  // ═══════════════════════════════════════════════════════════

  // ═══════════════════════════════════════════════════════════
  function init() {
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('c') || params.get('campaign');

    // Language ticker (always rendered)
    const ticker = document.getElementById('ticker');
    [...LANGS, ...LANGS].forEach(([flag, label]) => {
      const s = document.createElement('span');
      s.innerHTML = `<em>${flag}</em>${label}`;
      ticker.appendChild(s);
    });

    if (!cid || !CAMPAIGNS[cid]) {
      renderIndex();
      return;
    }

    const c = CAMPAIGNS[cid];
    const pageUrl = `https://brightlane.github.io/verified-merchant-directory/campaign-pages.html?c=${cid}`;
    const affiliateLink = buildLink(c.url, 1, cid);

    // ── Meta tags
    document.title = `${c.name} — ${c.tagline} | Brightlane`;
    document.getElementById('meta-title').textContent = `${c.name} — ${c.tagline} | Brightlane`;
    document.getElementById('meta-desc').setAttribute('content', c.metaDesc);
    document.getElementById('meta-keywords').setAttribute('content', c.keywords);
    document.getElementById('meta-canonical').setAttribute('href', pageUrl);
    document.getElementById('og-title').setAttribute('content', `${c.name} — ${c.tagline}`);
    document.getElementById('og-desc').setAttribute('content', c.metaDesc);
    document.getElementById('og-url').setAttribute('content', pageUrl);
    document.getElementById('og-image-alt').setAttribute('content', `${c.name} via Brightlane Verified Merchant Directory`);
    document.getElementById('tw-title').setAttribute('content', `${c.name} — ${c.tagline}`);
    document.getElementById('tw-desc').setAttribute('content', c.metaDesc);

    // ── Hreflang
    const hc = document.getElementById('hreflang-container');
    HREFLANGS.forEach(([lang, suffix]) => {
      const l = document.createElement('link');
      l.rel = 'alternate';
      l.hreflang = lang;
      l.href = pageUrl + suffix;
      hc.appendChild(l);
    });

    // ── JSON-LD: Product/Service
    document.getElementById('jsonld-product').textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "Product",
      "name": c.name,
      "description": c.desc,
      "url": c.merchantUrl,
      "offers": {
        "@type": "Offer",
        "url": affiliateLink,
        "priceCurrency": "USD",
        "availability": "https://schema.org/InStock",
        "seller": { "@type": "Organization", "name": c.name }
      }
    });

    // ── JSON-LD: Organization
    document.getElementById('jsonld-org').textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Brightlane Verified Merchant Directory",
      "url": "https://brightlane.github.io/verified-merchant-directory/",
      "description": "A curated directory of verified affiliate merchant partners."
    });

    // ── JSON-LD: FAQPage
    document.getElementById('jsonld-faq').textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": c.faqs.map(f => ({
        "@type": "Question",
        "name": f.q,
        "acceptedAnswer": { "@type": "Answer", "text": f.a }
      }))
    });

    // ── Nav CTA
    const navCta = document.getElementById('nav-cta-link');
    navCta.href = affiliateLink;
    navCta.textContent = `Visit ${c.name} →`;

    // ── Render page
    renderCampaignPage(c, cid, affiliateLink);
  }
